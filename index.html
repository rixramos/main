<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>John Rick's Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(5,10,20,0.85), rgba(5,10,20,0.95)),
                  url('https://images.unsplash.com/photo-1526378722484-cc5c3f0d7f6d') no-repeat center/cover;
      display: flex; justify-content: center; align-items: center;
      color: #fff; padding: 20px;
    }

    .glass {
      backdrop-filter: blur(18px);
      background: rgba(0, 0, 0, 0.45);
      border-radius: 20px;
      padding: 50px 40px;
      width: 100%; max-width: 900px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
      display: flex; flex-direction: column; align-items: center;
    }

    .profile {
      width: 230px; height: 230px;
      border-radius: 50%; object-fit: cover;
      margin-bottom: 15px;
      border: 3px solid rgba(0,255,255,0.6);
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .profile:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,255,255,0.7), 0 0 45px rgba(0,102,255,0.4);
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      color: #00f5ff;
      border-right: 2px solid #00f5ff;
      white-space: nowrap; overflow: hidden; width: 0;
      animation: blinkCursor 0.8s infinite;
    }
    @keyframes blinkCursor {
      0%,50%,100%{border-color:#00f5ff;} 25%,75%{border-color:transparent;}
    }

    p { font-size: 1.2rem; opacity: 0.9; margin-bottom: 25px; line-height: 1.7; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px; margin-top: 30px; width: 100%;
    }
    .card {
      position: relative; border-radius: 15px; overflow: hidden; cursor: pointer;
      background: rgba(0,0,0,0.5); transition: transform 0.3s;
    }
    .card:hover { transform: translateY(-5px); }
    .card img { width: 100%; height: 180px; object-fit: cover; display: block; }

    .details {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 15px; opacity: 0; transition: 0.3s;
    }
    .card:hover .details { opacity: 1; }
    .details p { font-size: 1.05rem; }

    .icons { margin-top: 30px; }
    .icons a {
      margin: 0 12px; font-size: 1.6rem; color: #fff; transition: 0.3s;
      text-shadow: 0 0 6px rgba(0,255,255,0.3);
    }
    .icons a:hover {
      color: #00f5ff; transform: scale(1.2);
      text-shadow: 0 0 10px rgba(0,255,255,0.7), 0 0 20px rgba(0,102,255,0.4);
    }

    .resume-container { margin-top: 40px; position: relative; }
    .btn {
      padding: 12px 25px; background: transparent; color: #fff;
      border: 2px solid #00f5ff; border-radius: 12px; text-decoration: none;
      transition: 0.3s; display: inline-block;
      box-shadow: 0 0 8px rgba(0,245,255,0.25);
    }
    .btn:hover {
      color: #000;
      background: linear-gradient(270deg, #00f5ff, #0066ff, #00f5ff);
      background-size: 300% 300%; animation: flash 2s linear infinite;
    }
    @keyframes flash {
      0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}
    }

    .bubble {
      position: absolute; bottom: 60px; left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: rgba(0,0,0,0.8);
      padding: 10px 15px; border-radius: 12px;
      font-size: 0.9rem; opacity: 0; pointer-events: none;
      transition: 0.3s; white-space: nowrap;
    }
    .resume-container:hover .bubble {
      opacity: 1; transform: translateX(-50%) scale(1);
      animation: float 0.6s ease;
    }
    @keyframes float {
      0%{transform:translateX(-50%) translateY(10px) scale(0.8);opacity:0;}
      100%{transform:translateX(-50%) translateY(0) scale(1);opacity:1;}
    }

    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .modal.active { opacity: 1; pointer-events: all; }

    .modal-content {
      position: relative;
      backdrop-filter: blur(15px);
      background: rgba(0, 0, 0, 0.4);
      padding: 20px 25px 20px 25px;
      border-radius: 15px;
      font-size: 16px;
      transform: scale(0.8);
      transition: 0.3s;
      box-shadow: 0 0 25px rgba(0,245,255,0.4), 0 0 50px rgba(0,102,255,0.2);
      max-width: 900px;
      max-height: 85vh;
      overflow: auto;
    }
    .modal.active .modal-content { transform: scale(1); }

                    
    .modal-content strong {
      font-size: 22px;
      display: inline-block;
      margin-bottom: 6px;
    }
    .modal-content div { line-height: 1.8; }

    .skills-content p {
      margin: 4px 0;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    /* Ensure images always fit */
    .skills-content img {
      max-width: 100% !important;
      height: auto !important;
      border-radius: 8px;
    }

    .skills-content > div {
      display: grid;
      grid-template-columns: 1fr 300px;
      align-items: center;
      gap: 15px;
      margin: 0 auto 15px auto;
      max-width: 750px;
    }

    /* Timeline (Experience) */
    .timeline {
      position: relative;
      padding-left: 25px;
      margin-left: 5px;
      border-left: 2px solid rgba(0,245,255,0.4);
      overflow: hidden;
    }

    /* Animated line drawing */
    .timeline::after {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 2px;
      height: 100%;
      background: linear-gradient(#00f5ff, #0066ff);
      transform: scaleY(0);
      transform-origin: top;
      animation: drawLine 1s ease forwards;
    }

    @keyframes drawLine {
      to { transform: scaleY(1); }
    }

    .timeline-item {
      position: relative;
      margin-bottom: 25px;
      padding-left: 15px;
      transition: 0.3s;
    }

    /* Hover glow effect */
    .timeline-item:hover {
      transform: translateX(5px);
      text-shadow: 0 0 8px rgba(0,245,255,0.6);
    }

    .timeline-item:hover .timeline-title {
      color: #00f5ff;
      text-shadow: 0 0 10px rgba(0,245,255,0.8), 0 0 20px rgba(0,102,255,0.4);
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -11px;
      top: 5px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00f5ff;
      box-shadow: 0 0 10px rgba(0,245,255,0.8);
    }

    .timeline-title {
      font-size: 18px;
      color: #00f5ff;
      margin-bottom: 5px;
    }

    .timeline-sub {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .timeline-desc {
      font-size: 14px;
      opacity: 0.9;
      line-height: 1.6;
    }

    .loader {
      position: fixed; inset: 0; background: #050a14;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; color: #00f5ff;
      font-size: 1.5rem; letter-spacing: 2px;
    }
    .loader-text { animation: pulse 1s ease-in-out infinite; text-shadow: 0 0 10px rgba(0,245,255,0.7); }
    .progress { width: 200px; height: 4px; background: rgba(255,255,255,0.1); margin-top: 20px; overflow: hidden; border-radius: 5px; }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg,#00f5ff,#0066ff); animation: loadBar 1.5s linear forwards; }
    @keyframes loadBar { from{width:0%} to{width:100%} }
    @keyframes pulse { 0%{opacity:.5;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}100%{opacity:.5;transform:scale(.95)} }

    /* Minimal Mobile Styles (clean & non-breaking) */
    @media (max-width: 768px) {
      .glass { padding: 28px 18px; }

      .profile { width: 160px; height: 160px; }
      h1 { font-size: 2rem; }

      .modal-content {
        font-size: 15px;
        padding: 14px;
        max-width: 95vw;
        max-height: 85vh;
        overflow: auto;
      }

      .modal-content strong { font-size: 18px; }

      /* Clean stack: text first, image below */
      .skills-content > div {
        grid-template-columns: 1fr;
        text-align: center;
        justify-items: center;
      }

      .skills-content > div > div {
        width: 100%;
        text-align: center;
      }

      .skills-content img {
        width: 90% !important;
        max-width: 240px;
        height: auto !important;
        margin-top: 10px;
      }
    }

  </style>
</head>
<body>

  <div class="loader" id="loader">
    <div class="loader-text">Welcome...</div>
    <div class="progress"><div class="progress-bar"></div></div>
  </div>

  <div class="glass">
    <img src="your-photo.jpg" alt="Your Photo" class="profile">
    <h1 id="name"></h1>
    <p>Think Before You Click, Moderate Before You Post.</p>

    <div class="cards">
      <div class="card" onclick="openModal('skills')">
        <img src="https://images.unsplash.com/photo-1603205431143-ce58f21799a4" alt="Skills">
        <div class="details"><p><strong></strong><br><strong>Skills:</strong><br>HTML, CSS, Visual Basic, UI/UX Design</p></div>
      </div>
      <div class="card" onclick="openModal('experience')">
        <img src="https://images.unsplash.com/photo-1724476894449-7e11eb6b2204" alt="Experience">
        <div class="details"><p><strong></strong><br><strong>Experience:</strong><br>Technical Support, Content Moderator, Freelance Projects</p></div>
      </div>
    </div>

    <div class="resume-container">
      <div class="bubble">Thank You! 🚀</div>
      <a href="resume.pdf" download class="btn">Download Resume</a>
    </div>

    <div class="icons">
      <a href="http://www.linkedin.com/in/ramos999/" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="https://github.com/rixramos" target="_blank"><i class="fab fa-github"></i></a>
      <a href="mailto:johnrick.ramos999@gmail.com"><i class="fas fa-envelope"></i></a>
      <a href="https://discord.com/users/416852234396106754" target="_blank"><i class="fab fa-discord"></i></a>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content" id="modalContent">Test Message</div>
  </div>

  <script>
    function openModal(type) {
      const modal = document.getElementById('modal');
      const content = document.getElementById('modalContent');

      if (type === 'skills') {
        content.innerHTML = `

        <div class="skills-content">
          <div style="display:grid; grid-template-columns: 1fr 300px; align-items:center; gap:15px; margin-bottom:15px;">
            <div>
              <strong>Computer Technician</strong>
              <p>Hardware troubleshooting</p>
              <p>PC assembly & maintenance</p>
              <p>OS installation & configuration</p>
            </div>
            <img src="https://images.unsplash.com/photo-1756801370266-f589801cedc3" style="width: 300px; height: 200px; object-fit:cover; border-radius:8px;">
          </div>

          <div style="display:grid; grid-template-columns: 1fr 300px; align-items:center; gap:15px; margin-bottom:15px;">
            <div>
              <strong>Technical Support Representative</strong>
              <p>Customer support & communication</p>
              <p>Issue diagnosis & resolution</p>
              <p>Ticketing systems (Zendesk, Salesforce)</p>
            </div>
            <img src="https://images.unsplash.com/photo-1553775282-20af80779df7" style="width: 300px; height: 200px; object-fit:cover; border-radius:8px;">
          </div>

          <div style="display:grid; grid-template-columns: 1fr 300px; align-items:center; gap:15px; margin-bottom:15px;">
            <div>
              <strong>Content Moderator</strong>
              <p>Content review & policy enforcement</p>
              <p>Attention to detail</p>
              <p>Handling sensitive material</p>
            </div>
            <img src="https://images.unsplash.com/photo-1585441071460-8e1eb62220ef" style="width: 300px; height: 200px; object-fit:cover; border-radius:8px;">
          </div>
        </div>`;
      } else {
        content.innerHTML = `
          <div class="timeline">

            <!-- New Top Branch -->
            <div class="timeline-item">
              <div class="timeline-title">Learning New Skills</div>
              <div class="timeline-sub">Present</div>
              <div class="timeline-desc">Continuously exploring new technologies in the tech industry, including leveraging AI tools as a companion for productivity, automation, and problem-solving.</div>
            </div>

            <!-- Latest Experience -->
            <div class="timeline-item">
              <div class="timeline-title">Content Moderator</div>
              <div class="timeline-sub">Transcom PH • May 2024 – September 2024</div>
              <div class="timeline-desc">Reviewed and moderated user-generated content to ensure compliance with platform policies, maintaining quality and safety standards while handling sensitive materials efficiently.</div>
            </div>

            <div class="timeline-item">
              <div class="timeline-title">Technical Support Representative</div>
              <div class="timeline-sub">Sykes Asia Inc. • May 2022 – March 2023</div>
              <div class="timeline-desc">Provided technical assistance to customers by diagnosing issues, troubleshooting hardware/software problems, and delivering clear, effective solutions to ensure customer satisfaction.</div>
            </div>

          </div>
        `;
      }
      modal.classList.add('active');
    }

    document.getElementById('modal').addEventListener('click', function() {
      this.classList.remove('active');
    });

    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        startTypingLoop();
      }, 1500);
    });

    const text = "John Rick Ramos";
    const speed = 80;
    const loopDelay = 1500;
    const nameEl = document.getElementById("name");

    function startTypingLoop() {
      let index = 0;
      nameEl.textContent = "";
      nameEl.style.width = "0ch";
      function typeEffect() {
        if (index < text.length) {
          nameEl.textContent += text.charAt(index);
          nameEl.style.width = (index + 1) + "ch";
          index++;
          setTimeout(typeEffect, speed);
        } else {
          setTimeout(startTypingLoop, loopDelay);
        }
      }
      typeEffect();
    }
  </script>

</body>
</html>
