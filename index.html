<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(rgba(5,10,20,0.85), rgba(5,10,20,0.95)),
                  url('https://images.unsplash.com/photo-1526378722484-cc5c3f0d7f6d') no-repeat center/cover;
      display: flex; justify-content: center; align-items: center;
      color: #fff; padding: 20px;
    }

    .glass {
      backdrop-filter: blur(18px);
      background: rgba(0, 0, 0, 0.45);
      border-radius: 20px;
      padding: 50px 40px;
      width: 100%; max-width: 900px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.15);
      display: flex; flex-direction: column; align-items: center;
    }

    .profile {
      width: 230px;
      height: 230px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 3px solid rgba(0,255,255,0.6);
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .profile:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(0,255,255,0.7),
                  0 0 45px rgba(0,102,255,0.4);
    }

    h1 { font-size: 2.8rem; margin-bottom: 10px; }
    p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 25px; line-height: 1.6; }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px; margin-top: 30px; width: 100%;
    }

    .card {
      position: relative;
      border-radius: 15px; overflow: hidden; cursor: pointer;
      background: rgba(0,0,0,0.5);
      transition: transform 0.3s;
    }

    .card:hover { transform: translateY(-5px); }

    .card img {
      width: 100%; height: 180px; object-fit: cover; display: block;
    }

    /* Center Overlay Content */
    .details {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 15px;
      opacity: 0;
      transition: 0.3s;
    }

    .card:hover .details {
      opacity: 1;
    }

    .details p { font-size: 0.95rem; }

    .icons { margin-top: 30px; }
    .icons a {
      margin: 0 12px;
      font-size: 1.6rem;
      color: #fff;
      transition: 0.3s;
      text-shadow: 0 0 6px rgba(0,255,255,0.3);
    }
    .icons a:hover {
      color: #00f5ff;
      transform: scale(1.2);
      text-shadow: 0 0 10px rgba(0,255,255,0.7),
                   0 0 20px rgba(0,102,255,0.4);
    }
    .icons a:hover {
      color: #00f5ff; transform: scale(1.2);
    }

    /* Resume Button */
    .resume-container { margin-top: 40px; position: relative; }

    .btn {
      padding: 12px 25px; background: transparent; color: #fff;
      border: 2px solid #00f5ff; border-radius: 12px;
      text-decoration: none; transition: 0.3s; display: inline-block;
      box-shadow: 0 0 8px rgba(0,245,255,0.25);
    }

    .btn:hover {
      color: #000;
      background: linear-gradient(270deg, #00f5ff, #0066ff, #00f5ff);
      background-size: 300% 300%;
      animation: flash 2s linear infinite;
    }

    @keyframes flash {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Thank You Bubble */
    .bubble {
      position: absolute; bottom: 60px; left: 50%;
      transform: translateX(-50%) scale(0.8);
      background: rgba(0,0,0,0.8);
      padding: 10px 15px; border-radius: 12px;
      font-size: 0.9rem; opacity: 0; pointer-events: none;
      transition: 0.3s;
      white-space: nowrap;
    }

    .resume-container:hover .bubble {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      animation: float 0.6s ease;
    }

    @keyframes float {
      0% { transform: translateX(-50%) translateY(10px) scale(0.8); opacity: 0; }
      100% { transform: translateX(-50%) translateY(0) scale(1); opacity: 1; }
    }

  

    /* Popup Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }

    .modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      backdrop-filter: blur(15px);
      background: rgba(0, 0, 0, 0.4);
      padding: 25px 35px;
      border-radius: 15px;
      font-size: 1.2rem;
      transform: scale(0.8);
      transition: 0.3s;
      box-shadow: 0 0 25px rgba(0, 245, 255, 0.4),
                  0 0 50px rgba(0, 102, 255, 0.2);
    }

    .modal.active .modal-content {
      transform: scale(1);
    }

  

    /* Loading Screen */
    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #050a14;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      color: #00f5ff;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }

    .loader-text {
      animation: glitch 1s infinite;
      text-shadow: 0 0 10px rgba(0,245,255,0.7);
    }

    /* Progress Bar */
    .progress {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      margin-top: 20px;
      overflow: hidden;
      border-radius: 5px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00f5ff, #0066ff);
      animation: loadBar 1.5s linear forwards;
    }

    @keyframes loadBar {
      from { width: 0%; }
      to { width: 100%; }
    }

    /* Glitch Animation */
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-1px, 1px); }
      80% { transform: translate(1px, -1px); }
      100% { transform: translate(0); }
    }

    @keyframes pulse {
      0% { opacity: 0.5; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.05); }
      100% { opacity: 0.5; transform: scale(0.95); }
    }

  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loader" id="loader">
    <div class="loader-text">Welcome...</div>
    <div class="progress">
      <div class="progress-bar"></div>
    </div>
  </div>
  </div>

  <div class="glass">

    <img src="your-photo.jpg" alt="Your Photo" class="profile">

    <h1>Your Name</h1>
    <p>Your introduction goes here. Keep it short, clean, and impactful.</p>

    <div class="cards">
      <div class="card" onclick="openModal()">
        <img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f" alt="Skills">
        <div class="details">
          <p><strong>Text Here</strong><br><strong>Skills:</strong><br>HTML, CSS, JavaScript, React, UI/UX Design</p>
        </div>
      </div>

      <div class="card" onclick="openModal()">
        <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7" alt="Experience">
        <div class="details">
          <p><strong>Text Here</strong><br><strong>Experience:</strong><br>Technical Support, Content Moderator, Freelance Projects</p>
        </div>
      </div>
    </div>

    <div class="resume-container">
      <div class="bubble">Thank You! 🚀</div>
      <a href="resume.pdf" download class="btn">Download Resume</a>
    </div>

    <div class="icons">
      <a href="http://www.linkedin.com/in/ramos999/" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="https://github.com/rixramos" target="_blank"><i class="fab fa-github"></i></a>
      <a href="mailto:johnrick.ramos999@gmail.com"><i class="fas fa-envelope"></i></a>
      <a href="https://discord.com/users/416852234396106754" target="_blank"><i class="fab fa-discord"></i></a>
    </div>

  </div>

  



  <!-- Popup Modal -->
  <div class="modal" id="modal">
    <div class="modal-content">Test Message</div>
  </div>

  <script>
    function openModal() {
      document.getElementById('modal').classList.add('active');
    }

    document.getElementById('modal').addEventListener('click', function() {
      this.classList.remove('active');
    });
  

    // Loading screen (1 second)
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
      }, 1500);
    });
  </script>

</body>
</html>
